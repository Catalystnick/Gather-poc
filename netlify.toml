# Netlify config for Gather PoC client
# Server must be deployed separately (Render, Railway, etc.)

[build]
  base = "client"
  command = "npm run build"
  publish = "dist"

# Cross-Origin isolation headers required by onnxruntime-web (SharedArrayBuffer)
# and AudioWorklet security. Must be set on every response, including the SPA
# index.html and all static assets.
x
# SPA: serve index.html for all routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
